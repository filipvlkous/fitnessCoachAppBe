# Roští.cz deployment workflow (Node.js)
#
# Deploys the app on every push to the selected branch or when a GitHub release
# is published. Deployment copies the repo into /srv/app via rsync, installs
# dependencies, builds the app and restarts it under supervisord.
#
# BEFORE USE — replace the placeholders below with the values from the
# Roští administration (Aplikace -> CI/CD), and add these repository secrets
# (Settings -> Secrets and variables -> Actions):
#   - ROSTI_SSH_KEY : private SSH key for deployment (required)
#   - ENV           : contents of the production .env file (optional)
#
# Placeholders to replace with values generated by the Roští admin panel:
#   <SSH_HOST>     e.g. node42.rosti.cz
#   <SSH_USER>     e.g. app
#   <SSH_PORT>     e.g. 22042
#   <SSH_HOST_KEY> the server host key line shown in the admin panel

name: Deploy to Rosti.cz

on:
  push:
    branches:
      - main
  release:
    types:
      - published

concurrency:
  group: rosti-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ROSTI_SSH_KEY }}

      - name: Add server host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "<SSH_HOST_KEY>" >> ~/.ssh/known_hosts

      - name: Write .env file
        if: ${{ secrets.ENV != '' }}
        run: printf '%s' "${{ secrets.ENV }}" > .env

      - name: Deploy code to /srv/app
        run: |
          rsync -rltvz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            -e "ssh -p <SSH_PORT>" \
            ./ <SSH_USER>@<SSH_HOST>:/srv/app/

      - name: Install, build and restart on server
        run: |
          ssh -p <SSH_PORT> <SSH_USER>@<SSH_HOST> '\
            cd /srv/app && \
            npm ci && \
            npm run build && \
            supervisorctl restart app'
